language: java
sudo: false
dist: trusty

jdk:
  - openjdk7
  - oraclejdk8
  - oraclejdk9

before_install:
  # Ensure JAVA_HOME is set (Trusty handles this automatically for JDK7/8)
  - export JAVA_HOME=$(/usr/libexec/java_home 2>/dev/null || echo $JAVA_HOME)

  # Install Oracle JDK 9 manually (not included in Trusty)
  - |
    if [[ "$TRAVIS_JDK_VERSION" == "oraclejdk9" ]]; then
      echo "Installing Oracle JDK 9..."
      wget https://download.oracle.com/java/GA/jdk9/9/binaries/jdk-9_linux-x64_bin.tar.gz
      tar -xzf jdk-9_linux-x64_bin.tar.gz
      export JAVA_HOME=$PWD/jdk-9
      export PATH=$JAVA_HOME/bin:$PATH
      java -version
    fi

install:
  - mvn install -DskipTests=true -Dmaven.javadoc.skip=true -B -V


after_success:
  - mvn clean cobertura:cobertura -Ptravis-cobertura
