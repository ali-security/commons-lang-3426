language: java
sudo: required
services:
  - docker

env:
  - MAVEN_OPTS="-Xmx1024m"

jdk:
  - openjdk7
  - oraclejdk8
  - oraclejdk9

before_install:
  # Pull the pinned Travis Trusty legacy image
  - docker pull travisci/ci-trusty:packer-1511271010

  # Prepare a command prefix to run inside Docker
  - export DOCKER_CMD="docker run --rm -v $PWD:$PWD -w $PWD travisci/ci-trusty:packer-1511271010 bash -c"

  # For Oracle JDK9, download and set JAVA_HOME inside Docker
  - |
    if [[ "$TRAVIS_JDK_VERSION" == "oraclejdk9" ]]; then
      ORACLE_JDK9_URL="https://download.oracle.com/java/GA/jdk9/9/binaries/jdk-9_linux-x64_bin.tar.gz"
      export DOCKER_CMD="$DOCKER_CMD 'wget -q $ORACLE_JDK9_URL && tar -xzf jdk-9_linux-x64_bin.tar.gz && export JAVA_HOME=$PWD/jdk-9 && export PATH=$JAVA_HOME/bin:$PATH && java -version && mvn'"
    fi

install:
  # Run Maven install inside Docker
  - $DOCKER_CMD "mvn install -DskipTests=true -Dmaven.javadoc.skip=true -B -V"

script:
  # Run tests inside Docker
  - $DOCKER_CMD "mvn test -B"

after_success:
  # Run cobertura inside Docker
  - $DOCKER_CMD "mvn clean cobertura:cobertura"
